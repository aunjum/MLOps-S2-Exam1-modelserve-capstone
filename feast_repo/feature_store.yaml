# ModelServe — Feast Feature Store Configuration
# ================================================
# Configures Feast for local development with Redis online store.

project: modelserve
registry: ./registry.db
provider: local

# Online store - Redis for fast feature lookups
online_store:
  type: redis
  connection_string: redis:6379

# Offline store - File-based (for local development)
# In production, switch to S3:
#   type: snowflake.aws
#   ...
offline_store:
  type: file

# Entity key configuration
entity_key_serialization_version: 2