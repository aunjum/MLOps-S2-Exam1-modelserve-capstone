# ============================================================================
# ModelServe — Docker Compose (Local Development)
# ============================================================================
# TODO: Define your complete local development stack.
#
# Required services:
#   - PostgreSQL (MLflow backend store)
#   - Redis (Feast online store)
#   - MLflow Tracking Server (depends on Postgres)
#   - FastAPI Inference Service (depends on MLflow, Redis)
#   - Prometheus (scrapes FastAPI /metrics) — add in Sessions 3-4
#   - Grafana (reads from Prometheus) — add in Sessions 3-4
#
# For each service, consider:
#   - Which Docker image to use
#   - What ports to expose
#   - What environment variables to pass
#   - What volumes to mount for persistence
#   - What healthcheck to configure
#   - What depends_on relationships exist
#   - What network to attach to
#
# The entire stack must start with a single: docker compose up
# ============================================================================

version: "3.9"

# ─────────────────────────────────────────────────────────────
#  ModelServe — local development stack
#  Sessions 1-2 : postgres + mlflow + redis  (uncomment rest later)
#  Sessions 3-4 : uncomment fastapi
#  Sessions 4+  : uncomment prometheus + grafana
# ─────────────────────────────────────────────────────────────

networks:
  modelserve:
    driver: bridge

volumes:
  postgres_data:
  mlflow_artifacts:
  grafana_data:

services:

  # ── 1. PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: modelserve-postgres
    restart: unless-stopped
    networks: [modelserve]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB:       ${POSTGRES_DB:-mlflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. Redis (Feast online store) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: modelserve-redis
    restart: unless-stopped
    networks: [modelserve]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── 3. MLflow Tracking Server ─────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: modelserve-mlflow
    restart: unless-stopped
    networks: [modelserve]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: postgresql+psycopg2://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-ap-southeast-1}
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      sh -c "pip install psycopg2-binary && mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

