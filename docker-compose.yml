# ============================================================================
# ModelServe — Docker Compose (Local Development)
# ============================================================================
# Uses external PostgreSQL and Redis (configured in .env)

# ─────────────────────────────────────────────────────────────
#  Networks & Volumes
# ─────────────────────────────────────────────────────────────

networks:
  modelserve:
    driver: bridge

volumes:
  mlflow_artifacts:
  grafana_data:

services:

  # ── 1. MLflow Tracking Server (External PostgreSQL) ───────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: modelserve-mlflow
    restart: unless-stopped
    networks: [modelserve]
    ports:
      - "5000:5000"
    environment:
      # Use POSTGRES_CONNECTION_STRING from .env
      MLFLOW_TRACKING_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-ap-southeast-1}
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      sh -c "pip install psycopg2-binary && mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 2. FastAPI Inference Service (External Redis) ─────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modelserve-fastapi
    restart: unless-stopped
    networks: [modelserve]
    depends_on:
      mlflow:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME:          ${MODEL_NAME:-FraudDetector}
      MODEL_STAGE:         ${MODEL_STAGE:-Production}
      # Use external Redis connection
      REDIS_HOST:          ${REDIS_HOST}
      REDIS_PORT:          ${REDIS_PORT}
      REDIS_CONNECTION_STRING: ${REDIS_CONNECTION_STRING}
      FEAST_REPO_PATH:     /app/feast_repo
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-ap-southeast-1}
    volumes:
      - ./feast_repo:/app/feast_repo:rw
      - ./training:/app/training:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. Prometheus ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: modelserve-prometheus
    restart: unless-stopped
    networks: [modelserve]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. Grafana ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: modelserve-grafana
    restart: unless-stopped
    networks: [modelserve]
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro