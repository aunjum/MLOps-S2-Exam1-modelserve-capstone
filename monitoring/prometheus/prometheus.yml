# ModelServe — Prometheus Configuration
# =======================================
# Scrapes metrics from FastAPI service.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'modelserve'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI inference service
  - job_name: 'fastapi'
    scrape_interval: 10s
    static_configs:
      - targets: ['fastapi:8000']
    metrics_path: '/metrics'
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fastapi:8000'