# Grafana — Dashboard Provisioning
# ===================================
# Auto-loads dashboards from a directory.

apiVersion: 1

providers:
  - name: 'ModelServe Dashboards'
    type: file
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    editable: true